server {
    listen 3000;
    server_name localhost;

    # Serve React static files
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes serve index.html
    # WHY: React Router handles routing client-side.
    # Without this, refreshing /dashboard returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the FastAPI backend
    # WHY: Same-origin requests, no CORS needed.
    # The browser talks to nginx on :3000, nginx forwards /api/* to backend:8000.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support (for /api/v1/stream)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering for MJPEG streaming
        proxy_buffering off;
    }

    # Cache static assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
